
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataForge Analytics</title>

<script type="module" src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>

<style>

/* ===== GLOBAL ===== */
* { transition: all 0.25s ease; }

:root {
    --bg:#f4f6f9;
    --card:#ffffff;
    --text:#333;
}

.dark {
    --bg:#0f0f10;
    --card:#1c1c1e;
    --text:#fff;
}

html, body {
    margin:0;
    height:100%;
    font-family:"Segoe UI", sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* BACKGROUND GLOW */
body::before {
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    top:-150px;
    left:-150px;
    background:radial-gradient(circle, rgba(102,126,234,0.25), transparent);
    filter:blur(90px);
    z-index:-1;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo {
    width:50px;
    border-radius:10px;
}

/* BUTTON */
.toggle {
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#5dade2;
    color:white;
}

.toggle:hover {
    transform:scale(1.05);
}

/* BANNER */
.banner {
    text-align:center;
    font-size:26px;
    font-weight:700;
    padding:18px;
    margin:10px 20px;
    border-radius:14px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    position:relative;
    overflow:hidden;
}

/* SHINE */
.banner::before {
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shine 3s infinite;
}

@keyframes shine {
    0% { left:-100%; }
    100% { left:100%; }
}

/* ===== DASHBOARD FIX ===== */
.dashboard {
    display:flex;
    justify-content:center;
    align-items:stretch;
    padding:10px;
    height: calc(100vh - 160px);
}

/* TABLEAU CONTAINER */
.tableau-container {
    width:95%;
    max-width:1400px;
    height:100%;
    display:flex;
}

/* TABLEAU FIXED */
tableau-viz {
    width:100%;
    height:100%;
    min-height:600px;
    border-radius:12px;
}

/* PAGINATION */
.pagination {
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
}

.page-btn {
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#5dade2;
    color:white;
}

.page-btn.active {
    background:#2e86c1;
    transform:scale(1.1);
}

/* RESPONSIVE */
@media (max-width:768px){
    .header {
        flex-direction:column;
        gap:10px;
    }
    .banner {
        font-size:18px;
    }
    .dashboard {
        height: calc(100vh - 200px);
    }
}

@media (max-width:480px){
    .banner {
        font-size:16px;
    }
    .dashboard {
        height: calc(100vh - 220px);
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="newlogo.png" class="logo">
        <b>PES University</b>
    </div>

    <div style="display:flex; gap:10px;">
        <button class="toggle" onclick="toggleTheme()">🌗 Mode</button>
        <button class="toggle" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>
</div>

<!-- BANNER -->
<div class="banner">
    PES Data Science Project – Batch 6
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard"></div>

<!-- PAGINATION -->
<div class="pagination">
    <button class="page-btn active" onclick="loadPage(1)">1</button>
    <button class="page-btn" onclick="loadPage(2)">2</button>
</div>

<script>

/* DARK MODE */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

/* FULLSCREEN */
function toggleFullscreen(){
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

/* LOAD DASHBOARD */
function loadPage(page){

    document.querySelectorAll(".page-btn")
    .forEach(btn=>btn.classList.remove("active"));

    document.querySelectorAll(".page-btn")[page-1]
    .classList.add("active");

    const dash = document.getElementById("dashboard");

    dash.innerHTML = `
    <div class="tableau-container">
        <tableau-viz 
            src="${page===1 
                ? 'https://public.tableau.com/views/SVAP_Project9/LithiumTeslaShareanalysis?:language=en-US&publish=yes&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link'
                : 'https://public.tableau.com/views/TeslaLithiumCorrelation_17751211057940/StroyTeslaLithiumBusinessAnalysis?:language=en-US&publish=yes&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link'}"
            toolbar="bottom"
            hide-tabs>
        </tableau-viz>
    </div>`;
}

/* INIT */
loadPage(1);

</script>

</body>
</html>
