<!DOCTYPE html>

    <title>Dashboard Layout</title>

    <style>
        body {
            margin: 0;
            background: #0B1A33; /* Deep Navy Blue */
            font-family: Arial, sans-serif;
            color: #ffffff; /* White text */
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 25px;
        }

        /* Tiles */
        .tile {
            background: #12264D; /* Soft navy tile */
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .tile h3 {
            margin: 0 0 12px 0;
            color: #ffffff;
        }

        /* Tableau container */
        .tableauWrapper {
            width: 100%;
            height: 350px;
            position: relative;
        }

        .tableauWrapper object {
            width: 100%;
            height: 100%;
        }

        /* ✅ Modern Input Style */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="email"],
        input[type="text"],
        input[type="number"] {
            padding: 12px 14px;
            border: none;
            outline: none;
            border-radius: 8px;

            background: #F8FAFF;
            color: #000;
            font-size: 15px;

            box-shadow: inset 0 0 4px rgba(0,0,0,0.2);
            transition: 0.2s ease;
        }

        input:focus {
            box-shadow: 0 0 6px #4DA3FF;
        }

        /* Modern button */
        button {
            padding: 12px;
            background: #4DA3FF;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1C72D3;
        }

    </style>
</head>
